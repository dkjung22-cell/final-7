<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Visual Portfolio </title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hi+Melody&family=Playwrite+AU+VIC+Guides&display=swap" rel="stylesheet">
    
    <style>
        /* 전체 배경 그라데이션 및 폰트 설정 */
        body {

            font-family: "Playwrite AU VIC Guides", cursive;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #fffef7 0%, #b1ffd4 100%); 
        }

        /* 제목 스타일 */
        h1 {
            text-align: center;
            font-size: 50px;
            color: #555;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        /* 그리드 레이아웃 */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 30px; 
            padding: 20px; 
            max-width: 900px; 
            margin: 0 auto; 
        }
        
        /* 카드 디자인: 600x400 비율(3:2) 유지 */
        .card { 
            background-color: #f7f6f0; 
            aspect-ratio: 600 / 400; 
            border-radius: 0px; 
            border: none;
            overflow: hidden; 
            transition: transform 0.3s;
        }

        /* 마우스 올렸을 때 효과 */
        .card:hover {
            transform: scale(1.02);
        }

        /* iframe 설정 */
        .card iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }
    </style>
</head>

<body>

    <h1>나의 비주얼 포트폴리오</h1>

    <div class="gallery">
        <div class="card"><iframe src="work1.html"></iframe></div>
        <div class="card"><iframe src="work2.html"></iframe></div>
        <div class="card"><iframe src="work3.html"></iframe></div>
        <div class="card"><iframe src="work4.html"></iframe></div>
    </div>

</body>
</html>
